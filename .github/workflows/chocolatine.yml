name: Mirroring

on: [push, delete]

jobs:
  check_valid_is_valid_repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check the repository's name
        run: |
          if [ "${{ github.ref_name }}" = "no-ga" ]; then
            exit 1
          fi
      - name : Check if it's the same repository
        run: |
          if [ "${{ github.event.repository.ssh_url }}" = "${{vars.REMOTE_URL}}" ]; then
            exit 1
          fi
      - name: Get ssh url
        run: echo ${{github.event.repository.ssh_url}}
  clone_to_branch:
    runs-on: ubuntu-latest
    needs: check_valid_is_valid_repository
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            ${{vars.REMOTE_URL}}
          ssh_private_key:
            ${{ secrets.SSH_PRIVATE_KEY }}