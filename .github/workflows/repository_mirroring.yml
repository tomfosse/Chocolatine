name: Mirroring

on: [push, delete]

jobs:
  to_gitlab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            git@github.com:EpitechPGE1-2025/G-DOP-200-REN-2-1-bschocolatine-4.git
          ssh_private_key:
            ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}