name: Mirroring

on: [push, delete]

jobs:
  to_github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            git@github.com:EpitechPGE1-2025/G-DOP-200-REN-2-1-chocolatine-5.git
          ssh_private_key:
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Get name branch
        run: echo ${{ github.ref }}