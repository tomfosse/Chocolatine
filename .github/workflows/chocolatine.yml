name: Chocolatine project
on: [push]

jobs:
  check_remote_is_valid:
    runs-on: ubuntu-latest
    steps:
      - name: Check the repository's name
        run: |
          if [ "${{ github.ref_name }}" = "no-ga" ]; then
            echo "::error title=Branch's name isn't valid::Please rename your branch"; exit 1; 
          fi
      - name: Check if it's the same repository
        run: |
          if [ "${{ github.event.repository.ssh_url }}" = "${{vars.MIRROR_SSH_URL}}" ]; then
            echo "::error title=Repository's name is the same as the target::Please rename your remote repository"; exit 1; 
          fi
      - name: Check if the repository is on Epitech
        run: |
          if [[ "${{ github.event.repository.ssh_url }}" == *EpitechPGE1* ]]; then
              exit 1
          fi
  check_compilation_and_coding_style:
    runs-on: ubuntu-latest
    needs: check_remote_is_valid
    container:
      image: epitechcontent/epitest-docker
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: check_infractions
        run: banana-check-repo
      - name: compilation
        run: make
        working-directory: ${{ github.workspace }}
        timeout-minutes: 2
      - name: check_coding_style
        run: |
          make fclean
          make CC=epiclang -j 2> err_output
          if grep -q "warning:" err_output; then
              grep "warning:" err_output > warnings
              cat warnings | while read line;
              do
                file=$(echo "$line" | cut -d ":" -f1)
                type=$(echo "$line" | head -n1 | cut -d "[" -f3 | cut -d "]" -f1 | tr -d '\n')
                echo "::error file=$file,title=$type coding style error ::Please fix it";
              done
              exit 1;
          fi
      - name: clean_project
        run: make clean
      - name: check_executables
        shell: bash
        run: |
          set +e
          return_value=0
          nb_executables=0
          str=${{vars.EXECUTABLES}}
          str="${str//,/ }"
          arr=($str)
          for i in "${arr[@]}"; do
              ((nb_executables++))
              if [ -x "$i" ]; then
                if [ -e "$i" ]; then
                    ((return_value++))
                fi
              fi
          done
          if [ "$nb_executables" -ne "$return_value" ]; then
              exit 1
          fi
          exit 0
  run_tests:
    runs-on: ubuntu-latest
    needs: [check_remote_is_valid, check_compilation_and_coding_style]
    container:
      image: epitechcontent/epitest-docker
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Run Tests
        run: make tests_run
        timeout-minutes: 2
  push_to_mirror:
    runs-on: ubuntu-latest
    needs: [check_remote_is_valid, check_compilation_and_coding_style, run_tests]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            ${{vars.MIRROR_SSH_URL}}
          ssh_private_key:
            ${{ secrets.GIT_SSH_PRIVATE_KEY }}