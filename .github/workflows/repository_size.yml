name: Get repository size

on:
  push:
    branches:
      - main
jobs:
    get_size:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v6.0.2
            with:
                -sparse-checkout: .
          - name: Get name branch
            run: echo ${{ github.ref_name }}
          - name: Get size Repository
            run: du -skh --exclude=".git"